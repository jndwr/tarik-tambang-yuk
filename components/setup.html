<!-- SETUP: nama, mode, tingkat kesulitan -->
<div id="scrSetup" class="screen hidden absolute inset-0 z-20 flex items-center justify-center p-5 text-center bg-black/50 backdrop-blur-sm">
  <div class="bg-gradient-to-b from-white to-[#fff8ec] border-4 border-emas rounded-[26px] p-6 max-w-[400px] w-full shadow-[0_16px_40px_rgba(0,0,0,.4)] max-h-[94dvh] overflow-auto">
    <div class="text-[56px] mb-1">🪢✍️</div>
    <h1 class="text-[28px] text-merah font-black leading-tight mb-1.5">SIAP <b class="text-emasTua">BERTANDING?</b></h1>

    <div class="font-extrabold mt-3 mb-1.5 text-sm text-[#6a5237]">Nama pemain</div>
    <input id="setupName" maxlength="14" placeholder="Tulis namamu..."
      class="w-full py-3 px-3.5 border-2 border-emasTua rounded-[14px] text-base font-bold text-ink text-center focus:outline-none focus:border-merah" />

    <div class="font-extrabold mt-3 mb-1.5 text-sm text-[#6a5237]">Mode main</div>
    <div class="flex gap-2 justify-center" id="mode">
      <button data-m="cpu" class="sel flex-1 py-2.5 px-1 border-2 border-emasTua bg-white rounded-[14px] font-extrabold text-[13px] transition">🤖 Petualangan (vs CPU)</button>
      <button data-m="duo" class="flex-1 py-2.5 px-1 border-2 border-emasTua bg-white rounded-[14px] font-extrabold text-[13px] transition">👥 2 Pemain</button>
    </div>

    <div id="diffWrap">
      <div class="font-extrabold mt-3 mb-1.5 text-sm text-[#6a5237]">Tingkat kesulitan</div>
      <div class="flex gap-2 justify-center" id="diff">
        <button data-d="easy" class="flex-1 py-2.5 px-1 border-2 border-emasTua bg-white rounded-[14px] font-extrabold text-[13px] transition">😴 Santai</button>
        <button data-d="normal" class="sel flex-1 py-2.5 px-1 border-2 border-emasTua bg-white rounded-[14px] font-extrabold text-[13px] transition">💪 Seru</button>
        <button data-d="hard" class="flex-1 py-2.5 px-1 border-2 border-emasTua bg-white rounded-[14px] font-extrabold text-[13px] transition">🔥 Sadis</button>
      </div>
    </div>

    <button id="btnSetupStart"
      class="mt-4 w-full py-4 rounded-[18px] text-white text-xl font-black bg-gradient-to-b from-[#36b56b] to-hijau shadow-[0_6px_0_#146134] active:translate-y-1 transition">MAIN ▶</button>
    <button id="btnBackSplash"
      class="w-full mt-2 py-3 px-2.5 rounded-[14px] font-extrabold text-sm border-2 border-emasTua bg-white active:translate-y-0.5 transition">⟵ Kembali</button>
  </div>
</div>
