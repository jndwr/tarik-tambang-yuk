<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tarik Tambang Yuk!</title>
<link rel="icon" href="images/logo.svg" type="image/svg+xml" />

<!-- Tailwind CSS (Play CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          merah:'#d9333f', merahTua:'#b01e29', emas:'#ffce3a', emasTua:'#e0a500',
          krem:'#f6efe3', kulit:'#f3c39a', rambut:'#3a3433', ink:'#3a2a20',
          rope:'#d9b779', hijau:'#1f8a4c', hijauTua:'#146134',
        },
        fontFamily: { game:['"Trebuchet MS"','Segoe UI','system-ui','sans-serif'] },
        keyframes: {
          ovFade:{ '0%':{opacity:0}, '100%':{opacity:1} },
          cardIn:{ '0%':{opacity:0,transform:'translateY(26px) scale(.9)'}, '100%':{opacity:1,transform:'none'} },
          cdpop:{ '0%':{transform:'scale(.4)',opacity:0}, '40%':{transform:'scale(1.1)',opacity:1}, '100%':{transform:'scale(1)',opacity:1} },
          bob:{ '0%,100%':{transform:'translateY(0) rotate(-4deg)'}, '50%':{transform:'translateY(-10px) rotate(4deg)'} },
        },
        animation: {
          ovFade:'ovFade .28s ease', cardIn:'cardIn .42s cubic-bezier(.2,.85,.25,1)',
          cdpop:'cdpop .6s ease', bob:'bob 1.4s ease-in-out infinite',
        },
      },
    },
  };
</script>

<link rel="stylesheet" href="css/style.css" />
</head>
<body class="font-game text-ink bg-[#eef4f8] overflow-hidden select-none [touch-action:manipulation] h-full">
  <!-- Komponen HTML modular dimuat ke sini oleh js/loader.js -->
  <div id="app"
       class="relative w-full max-w-[600px] h-[100dvh] mx-auto overflow-hidden shadow-[0_0_40px_rgba(0,0,0,.2)]
              bg-[radial-gradient(120%_80%_at_50%_18%,#fff_0%,#fbfdff_55%,#eaf3fb_100%)]">
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
